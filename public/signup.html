<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | FSVP Builder</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary">
      <a href="/" class="brand"><img src="/images/ftc-logo.svg" alt="FTC International" class="brand-logo"><span>FSVP Builder</span></a>
      <ul class="nav-links">
        <li><a href="/login.html">Log in</a></li>
      </ul>
    </nav>
  </header>

  <main class="auth-main">
    <form class="auth-card" id="signupForm" novalidate>
      <h1>Create Your Account</h1>
      <div id="authStatus"></div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="10">
        <p class="hint">At least 10 characters.</p>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Sign Up</button>
      <p class="auth-switch">Already have an account? <a href="/login.html">Log in</a></p>
    </form>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
